name: Python CI

# Указываем, когда запускать проверки
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Клонирование репозитория
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Установка Python
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip" # Кэшируем зависимости для ускорения будущих сборок

    # 3. Установка инструментов
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Устанавливаем базовые инструменты для проверки
        pip install pytest mypy ruff

    # 4. Линтинг и форматирование кода (Ruff)
    - name: Check formatting and linting with ruff
      run: |
        ruff check .
        ruff format --check .

    # 5. Статический анализ типов (Mypy)
    - name: Type checking with mypy
      run: |
        mypy src/

    # 6. Запуск изолированных тестов (Pytest)
    - name: Test with pytest
      run: |
        pytest tests/